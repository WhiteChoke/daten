spring:
  application:
    name: userService
  datasource:
    url: jdbc:postgresql://localhost:5433/daten
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  server:
    port: 8080